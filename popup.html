<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h3>📚 SitasiInstan Pro</h3>
        <p class="subtitle">APA 7th & Chicago 17th (Smart Casing)</p>
        
        <button id="btn-extract" class="btn-primary">Ambil Data Halaman</button>
        <hr>

        <div class="form-group">
            <label>Judul Artikel</label>
            <input type="text" id="title" placeholder="Judul jurnal...">
        </div>

        <div class="form-group">
            <label>Penulis</label>
            <input type="text" id="author" placeholder="Nama penulis...">
        </div>

        <div class="form-group">
            <label>Nama Jurnal / Penerbit</label>
            <input type="text" id="journal" placeholder="Nama jurnal...">
        </div>

        <div class="form-group">
            <label>Tahun</label>
            <input type="text" id="year" placeholder="2024">
        </div>

        <button id="btn-generate" class="btn-secondary">Buat Format Sitasi</button>
        <p id="status-msg"></p>

        <div id="result-section" style="display: none; margin-top: 15px;">
            <div class="style-group">
                <span class="badge badge-apa">APA 7th Edition</span>
                <div class="result-item">
                    <label>Daftar Pustaka:</label>
                    <div class="citation-box" id="apa-ref"></div>
                    <button class="btn-copy" data-target="apa-ref">Copy Reference</button>
                </div>
                <div class="result-item">
                    <label>Sitasi Teks (Bodynote):</label>
                    <div class="citation-box" id="apa-body"></div>
                    <button class="btn-copy" data-target="apa-body">Copy Bodynote</button>
                </div>
            </div>

            <div class="style-group">
                <span class="badge badge-chicago">Chicago 17th Ed</span>
                <div class="result-item">
                    <label>Daftar Pustaka (Bibliography):</label>
                    <div class="citation-box" id="chi-bib"></div>
                    <button class="btn-copy" data-target="chi-bib">Copy Bibliography</button>
                </div>
                <div class="result-item">
                    <label>Catatan Kaki (Footnote):</label>
                    <div class="citation-box" id="chi-foot"></div>
                    <button class="btn-copy" data-target="chi-foot">Copy Footnote</button>
                </div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
