<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-text">
                <h3>SitasiInstan</h3>
                <p class="subtitle">Format Cepat APA 7th & Chicago 17th - by Min</p>
            </div>
            <div class="theme-toggle-icons">
                <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </div>
        </div>
        
        <button id="btn-extract" class="btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-down-circle"><circle cx="12" cy="12" r="10"></circle><polyline points="8 12 12 16 16 12"></polyline><line x1="12" y1="8" x2="12" y2="16"></line></svg>
            <span>Ambil Data Halaman</span>
        </button>
        <hr>

        <div class="form-group">
            <label for="title">Judul Artikel</label>
            <input type="text" id="title" placeholder="Cth: Analisis Sentimen Media Sosial...">
        </div>

        <div class="form-group">
            <label for="author">Penulis</label>
            <input type="text" id="author" placeholder="Cth: Ahmad Muhaimin, Siti Lestari...">
        </div>

        <div class="form-group">
            <label for="journal">Nama Jurnal / Penerbit</label>
            <input type="text" id="journal" placeholder="Cth: Jurnal Tekno-Informatika...">
        </div>

        <div id="repository-fields" style="display: none;">
            <div class="form-group">
                <label for="university">Nama Universitas</label>
                <input type="text" id="university" placeholder="Cth: UIN Antasari Banjarmasin">
            </div>
            <div class="form-group">
                <label for="doc-type">Jenis Dokumen</label>
                <select id="doc-type" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                    <option value="Skripsi">Skripsi (S1)</option>
                    <option value="Tesis">Tesis (S2)</option>
                    <option value="Disertasi">Disertasi (S3)</option>
                    <option value="Buku">Buku</option>
                    <option value="Laporan Penelitian">Laporan Penelitian</option>
                    <option value="Makalah Konferensi">Makalah Konferensi</option>
                </select>
            </div>
        </div>

        <div class="form-group" id="vol-no-fields" style="display: none;">
            <label>Volume & Nomor <span style="font-weight:400; color: var(--text-muted, #888); font-size:0.85em;">(opsional)</span></label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="volume" placeholder="Cth: 16" style="flex:1;">
                <input type="text" id="issue" placeholder="Cth: 2" style="flex:1;">
            </div>
        </div>

        <div class="form-group">
            <label for="year">Tahun Terbit</label>
            <input type="text" id="year" placeholder="Cth: 2024">
        </div>

        <div class="form-group">
            <label for="doi">DOI / Link</label>
            <input type="text" id="doi" placeholder="10.xxxx/xxxxx atau https://...">
        </div>

        <div class="form-group" style="margin-top: 20px; margin-bottom: 20px;">
            <label style="margin-bottom: 10px; font-weight: 600;">Pilih Gaya Sitasi:</label>
            <div style="display: flex; gap: 15px;">
                <label style="font-weight: normal; display: flex; align-items: center;">
                    <input type="radio" id="style-apa" name="citation-style" value="apa" checked>
                    <span style="margin-left: 5px;">APA 7th</span>
                </label>
                <label style="font-weight: normal; display: flex; align-items: center;">
                    <input type="radio" id="style-chicago" name="citation-style" value="chicago">
                    <span style="margin-left: 5px;">Chicago 17th</span>
                </label>
            </div>
        </div>

        <div class="button-group">
            <button id="btn-generate" class="btn-secondary">Buat Format Sitasi</button>
            <button id="btn-download-ris" class="btn-secondary" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <span>Unduh .RIS</span>
            </button>
        </div>
        <p id="status-msg"></p>

        <div id="result-section">
            <div class="style-group" id="apa-result">
                <span class="badge badge-apa">APA 7th Edition</span>
                <div class="result-item">
                    <label>Daftar Pustaka:</label>
                    <div class="citation-box" id="apa-ref"></div>
                    <button class="btn-copy" data-target="apa-ref">Salin Teks</button>
                </div>
                <div class="result-item">
                    <label>Sitasi Teks (In-text):</label>
                    <div class="citation-box" id="apa-body"></div>
                    <button class="btn-copy" data-target="apa-body">Salin Teks</button>
                </div>
            </div>

            <div class="style-group" id="chicago-result">
                <span class="badge badge-chicago">Chicago 17th Ed</span>
                <div class="result-item">
                    <label>Daftar Pustaka (Bibliography):</label>
                    <div class="citation-box" id="chi-bib"></div>
                    <button class="btn-copy" data-target="chi-bib">Salin Teks</button>
                </div>
                <div class="result-item">
                    <label>Catatan Kaki (Footnote):</label>
                    <div class="citation-box" id="chi-foot"></div>
                    <button class="btn-copy" data-target="chi-foot">Salin Teks</button>
                </div>
            </div>
        </div>
    </div>
    <script src="pdf.js"></script>
    <script src="popup.js"></script>
</body>
</html>
